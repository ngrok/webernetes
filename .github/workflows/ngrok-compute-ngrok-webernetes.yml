name: Build and Push Container (ngrok-webernetes / app_3FJXNVYusO1ETkb1y3U2sujopGK)

on:
  push:
    branches: ["**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ngrok-webernetes
  NGROK_APP_ID: app_3FJXNVYusO1ETkb1y3U2sujopGK

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: demo/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Write image reference
        run: |
          cat <<EOF > ngrok-image.json
          {"image":"${{ steps.meta.outputs.tags }}","commit_sha":"${{ github.sha }}"}
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ngrok-compute-image
          path: ngrok-image.json
