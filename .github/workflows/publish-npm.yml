name: npmjs

on:
  push:
    branches:
      - main

permissions:
  contents: write # create the release PR, tags, and GitHub releases
  pull-requests: write # create/update the changesets "Version Packages" PR
  id-token: write # OIDC for npm trusted publishing (no npm token needed)

env:
  DO_NOT_TRACK: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'ngrok/webernetes'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm 📦
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # use version from package.json#packageManager field
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
        env:
          # Trusted publishing (OIDC) handles npm auth via the id-token
          # permission above — intentionally no NPM_TOKEN here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
